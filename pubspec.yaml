name: surya_connect
description: Surya Connect - School management app for Surya Pre-School
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  intl: 0.20.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_background: "#8B1E00"
  adaptive_icon_foreground: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
